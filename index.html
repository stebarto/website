<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#060a14" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/img/logo.png" />
    <title>Stebarto.com</title>
    <meta name="description" content="Il sito di Stebarto è in lavorazione." />
    <meta property="og:title" content="Stebarto.com" />
    <meta property="og:description" content="Sito in lavorazione." />
    <meta property="og:type" content="website" />
    <link rel="icon" href="assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/site.css?v=6" />
</head>
<body>

    <!-- Orb sfocati fissi — sfondo continuo, nessun clip -->
    <span class="orb orb-1" aria-hidden="true"></span>
    <span class="orb orb-2" aria-hidden="true"></span>
    <span class="orb orb-3" aria-hidden="true"></span>
    <span class="orb orb-4" aria-hidden="true"></span>

    <nav class="side-nav" aria-label="Navigazione sezioni">
        <a class="side-nav-dot" data-target="about"   href="#about"   aria-label="About"></a>
        <a class="side-nav-dot" data-target="contact" href="#contact" aria-label="Contact"></a>
    </nav>

    <main>

        <!-- ── ABOUT ────────────────────────────────────── -->
        <section class="page-section" id="about">
            <!-- pallini piccoli decorativi -->
            <span class="dot dot-s d-1" aria-hidden="true"></span>
            <span class="dot dot-m d-2" aria-hidden="true"></span>
            <span class="dot dot-s d-3" aria-hidden="true"></span>
            <span class="dot dot-m d-4" aria-hidden="true"></span>
            <span class="dot dot-s d-5" aria-hidden="true"></span>

            <div class="about-inner">
                <img class="about-logo" data-reveal src="assets/img/logo.png" alt="Stebarto" />
                <p class="about-kicker" data-reveal>// ABOUT</p>
                <h1 class="about-title" data-reveal>Stebarto<span class="about-dot">.</span></h1>
                <p class="about-lead" data-reveal>Il sito è in lavorazione.</p>
            </div>
        </section>

        <!-- ── CONTACT ───────────────────────────────────── -->
        <section class="page-section" id="contact">
            <!-- pallini piccoli decorativi -->
            <span class="dot dot-m d-6" aria-hidden="true"></span>
            <span class="dot dot-s d-7" aria-hidden="true"></span>
            <span class="dot dot-m d-8" aria-hidden="true"></span>

            <div class="contact-inner">
                <p class="about-kicker" data-reveal>// CONTACT</p>
                <h2 class="contact-title" data-reveal>Scrivimi.</h2>
                <p class="contact-lead" data-reveal>Vuoi consigliarmi cosa potrei inserire nel mio sito o anche solo dirmi che il robottino qui sopra ti sta simpatico?</p>
                <a class="contact-link" data-reveal href="mailto:info@stebarto.com">info@stebarto.com</a>
            </div>
        </section>

    </main>

    <script src="js/nav.js?v=1"></script>
    <script src="js/effects.js?v=4"></script>
</body>
</html>
